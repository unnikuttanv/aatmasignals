<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 188 34" width="188" height="34">
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B8FAC"/>
      <stop offset="100%" stop-color="#33C8C1"/>
    </linearGradient>
    <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FE8464"/>
      <stop offset="100%" stop-color="#FE6E9A"/>
    </linearGradient>
  </defs>

  <!-- ECG / Heartbeat pulse (accent gradient, left side) -->
  <polyline
    points="0,17 5,17 6,15 7,17 8,8 9.5,26 11,17 12.5,14 14,17 17,17"
    stroke="url(#lg2)" stroke-width="2.2" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Center node -->
  <circle cx="17" cy="17" r="2.5" fill="url(#lg1)"/>

  <!-- Signal arcs (primary teal, right side) -->
  <path d="M17,12 A5,5 0 0 1 17,22"
    stroke="url(#lg1)" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M17,8 A9,9 0 0 1 17,26"
    stroke="url(#lg1)" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M17,4 A13,13 0 0 1 17,30"
    stroke="url(#lg1)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Wordmark: "Aathma" bold dark -->
  <text x="38" y="22"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="700" font-size="17" fill="#1E293B">Aathma</text>

  <!-- Wordmark: "Signals" teal -->
  <text x="113" y="22"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="400" font-size="17" fill="#0B8FAC">Signals</text>
</svg>
